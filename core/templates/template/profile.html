<!DOCTYPE html>
<html>
<head>
    <title>{{ profile.username }} - Profile</title>
</head>
<body>

<h2>{{ profile.username }}'s Profile</h2>

<h3>Posts:</h3>

{% for post in posts %}
    <div style="margin-bottom:20px;">
        <img src="{{ post.image.url }}" width="200"><br>
        {{ post.caption }}
    </div>
{% empty %}
    <p>No posts yet.</p>
{% endfor %}

<a href="/">Back to Home</a>

</body>
</html>
